project:
  name: "lno_sto_repeat_simulate_only"

settings:
  photon_energy_ev: 900.0
  angle_start_deg: 5.0
  angle_stop_deg: 15.0
  angle_count: 101
  polarization: "s"
  normalization: "mean"
  fit_method: "simulate_only"

materials:
  LNO:
    opc_file: "../../data/OPC/LaNiO3.dat"
    imfp_file: "../../data/IMFP/LNO.ANG"
  STO:
    opc_file: "../../data/OPC/SrTiO3.dat"
    imfp_file: "../../data/IMFP/STO.ANG"

parameters:
  lno_thickness:
    value: 20.0
    vary: false
  sto_thickness:
    value: 20.0
    vary: false
  interface_roughness:
    value: 3.0
    vary: false

stack:
  - id: "vacuum"
    material: "vacuum"
    thickness_A: 0.0
    roughness_A: 0.0

  - repeat:
      times: 4
      layers:
        - id: "lno_{repeat_index}"
          material: "LNO"
          tags: ["lno_layers", "oxide_layers"]
          thickness_A: "$lno_thickness"
          roughness_A: "$interface_roughness"

        - id: "sto_{repeat_index}"
          material: "STO"
          tags: ["sto_layers", "oxide_layers"]
          thickness_A: "$sto_thickness"
          roughness_A: "$interface_roughness"

  - id: "sto_substrate"
    material: "STO"
    tags: ["substrate", "sto_layers"]
    thickness_A: 0.0
    roughness_A: 0.0

core_levels:
  - name: "La 4d"
    binding_energy_ev: 105.0
    emit_from:
      tags: ["lno_layers"]
    concentration: 1.0
    emission_angle_deg: 0.0

  - name: "Ti 2p"
    binding_energy_ev: 460.0
    emit_from:
      tags: ["sto_layers"]
    concentration: 1.0
    emission_angle_deg: 0.0

datasets: {}

report:
  save_plots: true