# Optional baseline example. Bayesian optimization is not the recommended
# default fitting path and is not a fallback for missing JAX callbacks.
project:
  name: "synthetic_c_lno_sto_bo_optional_baseline"

settings:
  photon_energy_ev: 1000.0
  angle_start_deg: 6.9
  angle_stop_deg: 10.9
  angle_count: 161
  polarization: "s"
  normalization: "mean"
  fit_method: "bayesian_optimization"
  optimizer:
    n_calls: 40
    n_initial_points: 10
    random_state: 0

materials:
  C:
    opc_file: "../../data/OPC/C.dat"
    imfp_file: "../../data/IMFP/C.ANG"
  LNO:
    opc_file: "../../data/OPC/LaNiO3.dat"
    imfp_file: "../../data/IMFP/LNO.ANG"
  STO:
    opc_file: "../../data/OPC/SrTiO3.dat"
    imfp_file: "../../data/IMFP/STO.ANG"

parameters:
  carbon_thickness:
    initial: 8.5
    lower: 4.0
    upper: 16.0
    vary: true
  carbon_roughness:
    value: 2.333333333333333
    vary: false
  lno_thickness:
    initial: 19.2
    lower: 18.0
    upper: 22.0
    vary: true
  sto_thickness:
    initial: 20.8
    lower: 18.0
    upper: 22.0
    vary: true
  superlattice_roughness:
    initial: 2.2
    lower: 1.0
    upper: 5.0
    vary: true
  substrate_roughness:
    value: 3.0
    vary: false

stack:
  - id: "vacuum"
    material: "vacuum"
    thickness_A: 0.0
    roughness_A: 0.0
  - id: "carbon_cap"
    material: "C"
    tags: ["carbon_cap", "surface"]
    thickness_A: "$carbon_thickness"
    roughness_A: "$carbon_roughness"
  - repeat:
      times: 20
      layers:
        - id: "lno_{repeat_index}"
          material: "LNO"
          tags: ["lno_layers", "oxide_layers", "superlattice"]
          thickness_A: "$lno_thickness"
          roughness_A: "$superlattice_roughness"
        - id: "sto_{repeat_index}"
          material: "STO"
          tags: ["sto_layers", "oxide_layers", "superlattice"]
          thickness_A: "$sto_thickness"
          roughness_A: "$superlattice_roughness"
  - id: "sto_substrate"
    material: "STO"
    tags: ["substrate", "sto_layers"]
    thickness_A: 0.0
    roughness_A: "$substrate_roughness"

core_levels:
  - name: "La 4d"
    binding_energy_ev: 105.0
    emit_from:
      tags: ["lno_layers"]
    concentration: 1.0
    emission_angle_deg: 0.0
  - name: "O 1s"
    binding_energy_ev: 530.0
    emit_from:
      tags: ["oxide_layers", "substrate"]
    concentration: 1.0
    emission_angle_deg: 0.0
  - name: "Ti 2p"
    binding_energy_ev: 460.0
    emit_from:
      tags: ["sto_layers"]
    concentration: 1.0
    emission_angle_deg: 0.0
  - name: "C 1s"
    binding_energy_ev: 285.0
    emit_from:
      tags: ["carbon_cap"]
    concentration: 1.0
    emission_angle_deg: 0.0

datasets:
  reflectivity:
    path: "../../benchmarks/synthetic_c_lno_sto/lno_sto_c_synthetic_data.csv"
    name: "Reflectivity"
    angle_column: "angle_deg"
    intensity_column: "reflectivity"
    weight: 1.0
    log_floor: 1.0e-12
  rocking_curves:
    - path: "../../benchmarks/synthetic_c_lno_sto/lno_sto_c_synthetic_data.csv"
      name: "La 4d"
      angle_column: "angle_deg"
      intensity_column: "la4d_rc"
      normalization: "mean"
      weight: 1.0
    - path: "../../benchmarks/synthetic_c_lno_sto/lno_sto_c_synthetic_data.csv"
      name: "O 1s"
      angle_column: "angle_deg"
      intensity_column: "o1s_rc"
      normalization: "mean"
      weight: 1.0
    - path: "../../benchmarks/synthetic_c_lno_sto/lno_sto_c_synthetic_data.csv"
      name: "Ti 2p"
      angle_column: "angle_deg"
      intensity_column: "ti2p_rc"
      normalization: "mean"
      weight: 1.0
    - path: "../../benchmarks/synthetic_c_lno_sto/lno_sto_c_synthetic_data.csv"
      name: "C 1s"
      angle_column: "angle_deg"
      intensity_column: "c1s_rc"
      normalization: "mean"
      weight: 1.0

report:
  save_plots: true
