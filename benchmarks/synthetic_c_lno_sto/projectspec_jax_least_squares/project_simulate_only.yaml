project:
  name: "synthetic_c_lno_sto_projectspec_simulate_only"

settings:
  photon_energy_ev: 1000.0
  polarization: "s"
  normalization: "mean"
  slicing:
    mode: "fixed_grid"
    min_slices: 3
    max_slice_thickness_A: 1.0
    reference_values:
      carbon_thickness: 16.0
      carbon_roughness_fraction: 0.3333333333333333
      lno_thickness: 22.0
      sto_thickness: 22.0
      superlattice_roughness: 3.0
      substrate_roughness: 3.0
      angle_offset: 0.0
  angle_start_deg: 6.915650706368666
  angle_stop_deg: 10.915650706368666
  angle_count: 161
  fit_method: "simulate_only"

materials:
  C:
    opc_file: "../../../data/OPC/C.dat"
    imfp_file: "../../../data/IMFP/C.ANG"
  LNO:
    opc_file: "../../../data/OPC/LaNiO3.dat"
    imfp_file: "../../../data/IMFP/LNO.ANG"
  STO:
    opc_file: "../../../data/OPC/SrTiO3.dat"
    imfp_file: "../../../data/IMFP/STO.ANG"

parameters:
  carbon_thickness:
    value: 10.0
    vary: false
  carbon_roughness_fraction:
    value: 0.3333333333333333
    vary: false
  lno_thickness:
    value: 20.0
    vary: false
  sto_thickness:
    value: 20.0
    vary: false
  superlattice_roughness:
    value: 3.0
    vary: false
  substrate_roughness:
    value: 3.0
    vary: false
  angle_offset:
    value: 0.0
    vary: false

stack:
  - id: "vacuum"
    material: "vacuum"
    thickness_A: 0.0
    roughness_A: 0.0

  - id: "carbon_cap"
    material: "C"
    tags: ["carbon_layer"]
    thickness_A: "$carbon_thickness"
    # The original synthetic benchmark uses:
    # carbon_roughness = 1 + carbon_roughness_fraction * (min(5, carbon_thickness) - 1)
    # YAML expressions intentionally keep only arithmetic, so this ProjectSpec uses
    # the carbon_thickness >= 5 branch. That matches the synthetic truth and most
    # fitted candidates, but differs from the exact formula below 5 A.
    roughness_A: "1.0 + 4.0 * carbon_roughness_fraction"

  - repeat:
      times: 20
      layers:
        - id: "lno_{repeat_index}"
          material: "LNO"
          tags: ["lno_layers", "oxide_layers"]
          thickness_A: "$lno_thickness"
          roughness_A: "$superlattice_roughness"
        - id: "sto_{repeat_index}"
          material: "STO"
          tags: ["sto_layers", "oxide_layers"]
          thickness_A: "$sto_thickness"
          roughness_A: "$superlattice_roughness"

  - id: "sto_substrate"
    material: "STO"
    tags: ["sto_layers", "substrate"]
    thickness_A: 0.0
    roughness_A: "$substrate_roughness"

core_levels:
  - name: "La 4d"
    binding_energy_ev: 105.0
    emit_from:
      tags: ["lno_layers"]
    concentration: 1.0
    emission_angle_deg: 0.0
  - name: "O 1s"
    binding_energy_ev: 530.0
    emit_from:
      tags: ["oxide_layers", "substrate"]
    concentration: 1.0
    emission_angle_deg: 0.0
  - name: "Ti 2p"
    binding_energy_ev: 460.0
    emit_from:
      tags: ["sto_layers"]
    concentration: 1.0
    emission_angle_deg: 0.0
  - name: "C 1s"
    binding_energy_ev: 285.0
    emit_from:
      tags: ["carbon_layer"]
    concentration: 1.0
    emission_angle_deg: 0.0


report:
  save_plots: true
